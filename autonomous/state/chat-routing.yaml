# chat-routing.yaml — ドメイン→チャットURLマッピング
# 場所: ~/claude-telegram-bot/autonomous/state/chat-routing.yaml
# 参照: chat-router.py, nightly-forge-chrome.sh, Telegram handler
#
# url: チャットURL（空=未作成、inboxにフォールバック）
# keywords: ルーティング用キーワード（大文字小文字区別なし）
# title_template: チャット作成時の自動タイトル（{date}は作成日に置換）
# bootstrap: 初回inject用プロンプト（チャットの役割定義）
# project: プロジェクトUUID（省略時はdefault_projectを使用）

default_project: "019c15f4-3d2d-7263-a308-e7f6ccd6b3f8"

domains:
  # ============================================================
  # INBOX（フォールバック先）
  # ============================================================
  inbox:
    url: ""
    keywords: []
    title_template: "{date}_INBOX"
    bootstrap: |
      あなたはINBOXチャットです。未分類のメッセージを受け付けます。
      メッセージ内容から適切な専門チャットを判断し、振り分け先ドメイン名を提案してください。
      振り分け先の例: m1317, m1319, fa, vision, icad, access, pc
      メッセージ自体への回答も行いつつ、「このメッセージは[ドメイン名]チャット向きです」と添えてください。

  # ============================================================
  # 案件別
  # ============================================================
  m1317:
    url: ""
    keywords: ["M1317", "美山", "成田", "カット白菜", "白菜検査"]
    title_template: "{date}_M1317_美山成田_カット白菜検査"
    bootstrap: |
      あなたはM1317案件（美山成田カット白菜検査）の専門チャットです。
      案件情報: ~/machinelab-knowledge/inspection-vision/journal.ndjson にM1317関連エントリあり。
      Dropbox: ~/Machinelab Dropbox/machinelab/プロジェクト/ 以下にM1317フォルダ。
      主な検査対象: カット白菜の外観検査。KEYENCE XGシリーズ使用。
      過去の議論や設計決定を踏まえて回答してください。

  m1319:
    url: ""
    keywords: ["M1319", "中西", "煮炊き釜", "中西製作所"]
    title_template: "{date}_M1319_中西製作所_煮炊き釜試作機"
    bootstrap: |
      あなたはM1319案件（中西製作所 煮炊き釜試作機）の専門チャットです。
      Dropbox: ~/Machinelab Dropbox/machinelab/プロジェクト/ 以下にM1319フォルダ。
      過去の議論や設計決定を踏まえて回答してください。

  m1311:
    url: ""
    keywords: ["M1311", "ヤガイ", "カルパス", "おやつカルパス"]
    title_template: "{date}_M1311_ヤガイ_おやつカルパスライン"
    bootstrap: |
      あなたはM1311案件（ヤガイ おやつカルパスライン）の専門チャットです。
      Dropbox: ~/Machinelab Dropbox/machinelab/プロジェクト/ 以下にM1311フォルダ。
      過去の議論や設計決定を踏まえて回答してください。

  m1300:
    url: ""
    keywords: ["M1300", "伊藤ハム", "米久", "ケンコー", "ロースライン"]
    title_template: "{date}_M1300_伊藤ハム米久ケンコー工場_ロースライン出口コンベヤ等1号"
    bootstrap: |
      あなたはM1300案件（伊藤ハム米久 ケンコー工場 ロースライン出口コンベヤ等1号）の専門チャットです。
      Dropbox: ~/Machinelab Dropbox/machinelab/プロジェクト/ 以下にM1300フォルダ。
      過去の議論や設計決定を踏まえて回答してください。

  # ============================================================
  # スキル別
  # ============================================================
  icad:
    url: ""
    keywords: ["iCAD", "3DCAD", "部品図", "アセンブリ", "モデリング", "図面", "CAD"]
    title_template: "{date}_iCAD_機械設計"
    bootstrap: |
      あなたはiCAD SX機械設計の専門チャットです。
      参照: ~/machinelab-knowledge/icad/
      iCAD SXはParallels Windows 11上で動作。絶対座標入力はXY半角スペース区切り。
      参照点=相対座標入力の主要手段。GPU描画バグ回避でコマンドメニューのみ使用。
      設計規約・モデリングルール・標準部品の質問に対応してください。

  access:
    url: ""
    keywords: ["Access", "見積", "accdb", "品番", "受注", "納品", "販売先", "プロジェクト管理"]
    title_template: "{date}_AccessDB_業務データ"
    bootstrap: |
      あなたはAccess DB業務データの専門チャットです。
      参照: ~/machinelab-knowledge/access-db/
      DB: ~/Machinelab Dropbox/machinelab/etc/ACCESS/MLDatabase.accdb
      ACE14形式→mdb-toolsで読み取り不可。Parallels COM自動化が唯一の書き込み方法。
      見積書・プロジェクト・顧客データの照会・更新に対応してください。

  fa:
    url: ""
    keywords: ["PLC", "ラダー", "タッチパネル", "KV-8000", "KV STUDIO", "シーケンス", "インバータ", "FR-E820", "EtherNet/IP"]
    title_template: "{date}_FA_制御設計"
    bootstrap: |
      あなたはFA（ファクトリーオートメーション）制御設計の専門チャットです。
      参照: ~/machinelab-knowledge/plc-ladder/
      KV STUDIO注意: ELSE IF（スペース必須）。FR-E820 EtherNet/IP速度指令は常にr/min。
      制御パートナー: 内海さん（PLCプログラム担当）。
      ラダー設計・I/O表・インターロック・シーケンスの質問に対応してください。

  vision:
    url: ""
    keywords: ["検査", "カメラ", "KamiCheck", "噛み込み", "XG", "CV-X", "IV", "照明", "画像処理", "ビジョン"]
    title_template: "{date}_Vision_画像検査"
    bootstrap: |
      あなたは画像検査・ビジョンシステムの専門チャットです。
      参照: ~/machinelab-knowledge/inspection-vision/
      KamiCheck=AI噛み込み検査専用機。KEYENCE XG/CV-X/IVシリーズ対応。
      カメラ選定・レンズ選定・照明設計・検査アルゴリズムの質問に対応してください。

  # ============================================================
  # PC操作
  # ============================================================
  pc:
    url: ""
    keywords: ["Parallels", "LaunchAgent", "Hammerspoon", "Tailscale", "homebrew", "conda", "miniforge", "Mac設定", "移行"]
    title_template: "{date}_PC操作_Mac設定"
    bootstrap: |
      あなたはPC操作・Mac設定の専門チャットです。
      M1 MAX: username daijiromatsuokam1（引退予定）
      M3 Max 16インチ: username daijiromatsuoka（JARVIS母艦）
      M5 Max 14インチ: 3/28-30到着予定（新メイン機）
      exec bridge経由でM1/M3にコマンド実行可能。設定変更・移行作業に対応してください。

  # ============================================================
  # Forge系（夜間自律）
  # ============================================================
  forge-code:
    url: ""
    keywords: ["コード改善", "リファクタ", "テスト追加", "bun test", "NIGHTLY"]
    title_template: "{date}_Forge_Code"
    bootstrap: |
      あなたはNightly Forge Codeワーカーです。
      タスクはnightly-tasks.mdで指定されます。コード改善・リファクタ・テスト追加を実行してください。
      完了したタスクは[ ]→[x]に更新。git commitはfeat:/fix:/docs:プレフィックス必須。
      git pushは禁止（DJ手動）。bun testが通ることを必ず確認。

  forge-plc:
    url: ""
    keywords: ["SKILL-PLC", "plc-ladder学習"]
    title_template: "{date}_Forge_PLC"
    bootstrap: |
      あなたはNightly Forge PLCスキル学習ワーカーです。
      対象: ~/machinelab-knowledge/plc-ladder/
      journal.ndjsonの未処理エントリを分析し、patterns.mdに昇格してください。
      Web検索でKEYENCE KV/三菱FX/FR-E800の最新情報も収集。

  forge-vision:
    url: ""
    keywords: ["SKILL-VISION", "inspection-vision学習"]
    title_template: "{date}_Forge_Vision"
    bootstrap: |
      あなたはNightly Forge Visionスキル学習ワーカーです。
      対象: ~/machinelab-knowledge/inspection-vision/
      journal.ndjsonの未処理エントリを分析し、patterns.mdに昇格してください。
      Web検索でKEYENCE/Cognex/食品検査の最新情報も収集。

  forge-research:
    url: ""
    keywords: ["リサーチ", "research-topics", "X取得", "Web検索"]
    title_template: "{date}_Forge_Research"
    bootstrap: |
      あなたはNightly Forge Researchワーカーです。
      research-topics.mdの曜日別テーマに基づいてWeb検索を実行し、
      発見をcroppy-notes.mdに追記してください。
      形式: ## YYYY-MM-DD Nightly Research\n- [発見タイトル]: 概要（URL）

  # ============================================================
  # ディベート
  # ============================================================
  debate:
    url: ""
    keywords: ["ディベート", "debate", "設計議論", "設計判断"]
    title_template: "{date}_Debate"
    bootstrap: |
      あなたはディベートチャットです。設計判断について多角的に議論します。
      賛成派・反対派・実用派の3つの視点から論じてください。
      各ラウンドで収束した項目には[DECIDED]をつけてください。
      却下した案とその理由も必ず記録してください。
