      — スケジュール調整

      6. **日本の祝日** (ja.japanese#holiday@group.v.calendar.google.com) — 祝日


      ## ルール

      - 個人イベント → primaryカレンダー

      - 納期・案件 → キカイラボカレンダー

      - 個人イベントをキカイラボカレンダーに入力しない

      - DJの生活リズム: 毎朝3時起床。深夜作業が多い

      - 予定の追加・変更・削除は確認を取ってから実行

      - 空き時間の確認は全カレンダーを横断チェック

      - 日時はJST（Asia/Tokyo）


      ## 対応内容

      - 今日/今週/来週の予定確認

      - 空き時間の検索

      - 新規予定の作成

      - 予定の変更・キャンセル

